<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer App</title>
  <link rel="icon" href="image/timer.jpg" type="image/jpeg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="timer-card">
      <img class="app-icon" src="image/timer.jpg" alt="Stopwatch icon">
      <p class="eyebrow">Focus Timer</p>
      <div class="mode-switch" role="tablist" aria-label="Mode switch">
        <button type="button" class="mode-button active" id="countdown-mode-button" data-mode="countdown" aria-selected="true">Countdown</button>
        <button type="button" class="mode-button" id="stopwatch-mode-button" data-mode="stopwatch" aria-selected="false">Stopwatch</button>
      </div>
      <h1 id="mode-title">Countdown</h1>

      <div class="display-wrap">
        <div class="display" id="display" aria-live="polite">25:00</div>
      </div>

      <form class="time-form" id="time-form">
        <label>
          Minutes
          <input id="minutes-input" type="number" min="0" max="180" value="25">
        </label>
        <label>
          Seconds
          <input id="seconds-input" type="number" min="0" max="59" value="0">
        </label>
        <button type="submit" class="set-button">Set Timer</button>
      </form>

      <div class="presets" aria-label="Timer presets">
        <button type="button" class="preset-button" data-seconds="60">1 min</button>
        <button type="button" class="preset-button" data-seconds="300">5 min</button>
        <button type="button" class="preset-button" data-seconds="900">15 min</button>
        <button type="button" class="preset-button active" data-seconds="1500">25 min</button>
        <button type="button" class="preset-button" data-seconds="2700">45 min</button>
      </div>

      <div class="controls">
        <button type="button" class="primary" id="start-pause-button">Start</button>
        <button type="button" id="reset-button">Reset</button>
      </div>

      <p class="status" id="status">Ready</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
